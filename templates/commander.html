<!DOCTYPE html>
<html>

<head>
    <title>Commander</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Commander un produit</h2>

<form method="POST">

    <label>Produit :</label>

    <select name="id_produit">

        {% for produit in produits %}
        <option value="{{ produit.id }}">
            {{ produit.nom }} - {{ produit.prix }} €
        </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Quantité :</label>

    <input
        type="number"
        name="quantite"
        min="1"
        value="1"
        required
    >

    <br><br>

    <button type="submit">
        Commander
    </button>

</form>

<br>

<a href="/client/{{ id_client }}">
    Retour espace client
</a>

</body>
</html>
