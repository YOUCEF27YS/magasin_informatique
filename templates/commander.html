<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Commander</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Passer une commande</h1>

    <form method="POST">

        <label>Produit</label>

        <select name="id_produit" required>

            {% for produit in produits %}

            <option value="{{ produit.id }}">
                {{ produit.nom }}
                -
                {{ produit.prix }} €
                -
                Stock : {{ produit.stock }}
            </option>

            {% endfor %}

        </select>

        <br><br>

        <label>Quantité</label>

        <input
            type="number"
            name="quantite"
            min="1"
            required
        >

        <br><br>

        <button type="submit">
            Commander
        </button>

    </form>

    <br>

    <a href="/client/{{ id_client }}">
        Retour espace client
    </a>

</div>

</body>
</html>
